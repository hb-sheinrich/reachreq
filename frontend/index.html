<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReachReq</title>

    <script>
      (function () {
        try {
          const stored = localStorage.getItem('reachreq-theme')
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          const theme = stored || (prefersDark ? 'dark' : 'light')
          document.documentElement.setAttribute('data-theme', theme)
          document.documentElement.style.backgroundColor = theme === 'dark' ? '#0e1116' : '#f7f8fa'
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light')
        }
      })()
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
