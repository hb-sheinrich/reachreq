app = 'reachreq-hup'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile.fly'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[deploy]
  release_command = 'npx prisma migrate deploy'

[[vm]]
  size = 'shared-cpu-1x'
